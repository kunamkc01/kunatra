# Kunatra — local stack: Postgres + API + web.
#   docker compose up --build
# Then open http://localhost:3000 (API on http://localhost:4100).
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: kunatra
      POSTGRES_PASSWORD: kunatra
      POSTGRES_DB: kunatra
    volumes:
      - kunatra-db:/var/lib/postgresql/data
      # Loaded once, on first init of an empty data volume (in filename order).
      - ./apps/api/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./apps/api/db/operations.sql:/docker-entrypoint-initdb.d/02-operations.sql:ro
      - ./apps/api/db/auth.sql:/docker-entrypoint-initdb.d/03-auth.sql:ro
      - ./apps/api/db/investments.sql:/docker-entrypoint-initdb.d/04-investments.sql:ro
      - ./apps/api/db/contributions.sql:/docker-entrypoint-initdb.d/05-contributions.sql:ro
      - ./apps/api/db/members.sql:/docker-entrypoint-initdb.d/06-members.sql:ro
      - ./apps/api/db/tenancy.sql:/docker-entrypoint-initdb.d/07-tenancy.sql:ro
      - ./apps/api/db/compliance.sql:/docker-entrypoint-initdb.d/08-compliance.sql:ro
      - ./apps/api/db/audit.sql:/docker-entrypoint-initdb.d/09-audit.sql:ro
      - ./apps/api/db/roles.sql:/docker-entrypoint-initdb.d/10-roles.sql:ro
      - ./apps/api/db/acquisition.sql:/docker-entrypoint-initdb.d/11-acquisition.sql:ro
      - ./apps/api/db/profile.sql:/docker-entrypoint-initdb.d/12-profile.sql:ro
      - ./apps/api/db/income_tax.sql:/docker-entrypoint-initdb.d/13-income_tax.sql:ro
      - ./apps/api/db/memberships.sql:/docker-entrypoint-initdb.d/14-memberships.sql:ro
      - ./apps/api/db/asset_photos.sql:/docker-entrypoint-initdb.d/15-asset_photos.sql:ro
      - ./apps/api/db/notifications.sql:/docker-entrypoint-initdb.d/16-notifications.sql:ro
      - ./apps/api/db/recurrence_rent.sql:/docker-entrypoint-initdb.d/17-recurrence_rent.sql:ro
      - ./apps/api/db/person_income.sql:/docker-entrypoint-initdb.d/18-person_income.sql:ro
      - ./apps/api/db/valuation.sql:/docker-entrypoint-initdb.d/19-valuation.sql:ro
      - ./apps/api/db/history.sql:/docker-entrypoint-initdb.d/20-history.sql:ro
      - ./apps/api/db/valuation_history.sql:/docker-entrypoint-initdb.d/21-valuation_history.sql:ro
      - ./apps/api/db/access_log.sql:/docker-entrypoint-initdb.d/22-access_log.sql:ro
      - ./apps/api/db/landlord.sql:/docker-entrypoint-initdb.d/23-landlord.sql:ro
      - ./apps/api/db/personal_loans.sql:/docker-entrypoint-initdb.d/24-personal_loans.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kunatra -d kunatra"]
      interval: 3s
      timeout: 3s
      retries: 20
    # Not published to the host by default (avoids clashing with a local Postgres
    # on 5432). Uncomment to inspect from the host on 5433:
    # ports:
    #   - "5433:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: 4100
      DATABASE_URL: postgres://kunatra:kunatra@db:5432/kunatra
      CORS_ORIGIN: http://localhost:3000
      FIELD_ENCRYPTION_KEY: dev-only-not-secret
      AUTH_SECRET: dev-insecure-secret-change-me
    ports:
      - "4100:4100"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Baked into the client bundle — must be reachable from the browser.
        NEXT_PUBLIC_API_BASE: http://localhost:4100
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  kunatra-db:
